        :root {
            --primary: #ff006e;
            --secondary: #8338ec;
            --bg: #030712;
            --accent: #ffbe0b;
        }

        * {
            font-family: 'Outfit', sans-serif;

        }

        body {

            overflow-x: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-premium:hover {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 10px 40px rgba(255, 0, 110, 0.6);
            filter: brightness(1.3);
        }

        .text-glow {
            text-shadow: 0 0 25px rgba(255, 0, 110, 0.7), 0 0 50px rgba(131, 56, 236, 0.5);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #ff006e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes mesh {

            0%,
            100% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.1) translate(20px, 10px);
            }
        }

        .mesh-gradient {
            background: radial-gradient(circle at 50% 50%, #ff006e15 0%, transparent 50%), radial-gradient(circle at 100% 100%, #3a86ff10 0%, transparent 40%);
            filter: blur(80px);
            animation: mesh 10s infinite ease-in-out;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .card-pattern {
            background-color: rgba(255, 255, 255, 0.02);
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 24px 24px;
        }

        .roulette-container {
            position: relative;
            height: 220px;
            overflow: hidden;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .roulette-marker {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 50px;
            transform: translateY(-50%);
            border: 2px solid var(--primary);
            background: rgba(255, 0, 110, 0.15);
            z-index: 10;
            pointer-events: none;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.2);
        }

        .card-selection {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
        }

        .card-selection:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);

            box-shadow: 0 15px 40px -10px rgba(255, 0, 110, 0.5), inset 0 0 20px rgba(255, 0, 110, 0.1);

            }

                padding: 1.5rem;
            }

</head>

        const calculateBAC = (shots, weight, gender, startTime) => {
            if (!weight || !gender || !startTime) return null;
            const hours = (Date.now() - startTime) / 3600000;
            const factor = gender === 'M' ? 0.68 : 0.55;
            // 1 shot =~ 14g de álcool
            const bac = ((shots * 14) / (weight * factor)) - (hours * 0.15);
            return Math.max(0, bac).toFixed(2);
        };

            const [offset, setOffset] = useState(0);
            const itemH = 64; // Slightly taller items
            useEffect(() => {
                if (spin) {
                    const extraSpins = 8 + Math.floor(Math.random() * 4);
                    const targetIdx = Math.floor(Math.random() * items.length);
                    const totalOffset = (extraSpins * items.length + targetIdx) * itemH;
                    setOffset(totalOffset);
                    const timer = setTimeout(() => {
                        onEnd(items[targetIdx]);
                        if (navigator.vibrate) navigator.vibrate(50);
                    }, 4000);
                    return () => clearTimeout(timer);
                }
            }, [spin]);
            const displayItems = useMemo(() => { let res = []; for (let i = 0; i < 40; i++) res = [...res, ...items]; return res; }, [items]);
            return (
                <div className="roulette-container w-full h-[240px]">
                    <div className="roulette-marker h-[64px]"></div>
                    <motion.div initial={false} animate={{ y: -offset + 88 }} transition={{ duration: spin ? 4 : 0, ease: [0.15, 0.85, 0.35, 1] }} className="flex flex-col">
                        {displayItems.map((it, i) => {
                            const isString = typeof it === 'string';
                            const parts = isString ? [it] : it.text.split(' ');
                            const icon = !isString ? parts[0] : '';
                            const text = !isString ? parts.slice(1).join(' ') : it;
                            return (
                                <div key={i} className="h-[64px] flex items-center justify-center font-black text-xl md:text-2xl tracking-wider text-white/90 uppercase italic whitespace-nowrap px-4 w-full">

            const rankings = useMemo(() => [...players].sort((a, b) => b.shots - a.shots), [players]);
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black flex-col">
                    <div className="w-full max-w-sm aspect-[9/16] glass p-12 flex flex-col items-center text-center relative overflow-hidden bg-gradient-to-b from-primary/20 via-bg to-bg border-white/10">
                        <div className="text-6xl mb-8">👑</div>
                        <h2 className="text-[10px] font-black uppercase tracking-[0.5em] text-primary mb-6">HALL OF FAME</h2>
                        <p className="text-gray-500 font-bold uppercase text-[9px] tracking-widest mb-1">Mestre da Resistência</p>
                        <h3 className="text-5xl font-black italic uppercase mb-12 text-white">{winner.name}</h3>
                        <div className="w-full space-y-4 text-left">
                            <p className="text-[10px] font-black uppercase tracking-widest text-primary mb-4 opacity-70">Placar Etílico</p>
                            {rankings.map((p, i) => (
                                <div key={p.name} className="flex justify-between items-center border-b border-white/5 pb-2">
                                    <span className="text-xs font-bold uppercase tracking-widest"><span className="text-primary/40 mr-2 italic">#{i + 1}</span> {p.name}</span>
                                    <span className="font-mono text-primary font-bold">{p.shots} 🥃</span>
                                </div>
                            ))}
                        </div>
                        <p className="mt-auto text-[10px] text-gray-700 font-bold tracking-[0.2em] italic uppercase">Drink & Play Experience</p>
                    </div>
                    <div className="w-full max-w-sm mt-6 flex flex-col gap-3">
                        <button className="glass py-4 font-black uppercase tracking-widest text-xs text-primary border-primary/20">Baixar Story</button>
                        <button onClick={onRestart} className="btn-premium py-4 font-black uppercase tracking-widest text-xs">Nova Partida</button>
                    </div>
                </div>
            );
        };

        const DemocracyVote = ({ players, onEnd }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
                <GlassCard className="max-w-xs w-full text-center border-primary/20">
                    <div className="text-4xl mb-4">⚖️</div>
                    <h3 className="text-2xl font-black italic uppercase text-primary mb-2">VOTAÇÃO AO VIVO</h3>
                    <p className="text-gray-400 text-xs mb-8 font-medium">Quem vai tomar esse shot?</p>
                    <div className="grid grid-cols-1 gap-2">
                        {players.map(p => (
                            <button key={p.name} onClick={() => onEnd(p.name)} className="glass py-4 font-black uppercase text-[10px] tracking-[0.2em] hover:bg-primary transition-all">{p.name}</button>
                        ))}
                    </div>
                </GlassCard>
            </div>
        );

        // --- App ---
        function App() {
            const [view, setView] = useState('landing');
            const [players, setPlayers] = useState([]);
            const [name, setName] = useState('');
            const [weight, setWeight] = useState('');
            const [gender, setGender] = useState('');
            const [speedEnabled, setSpeedEnabled] = useState(false);
            const [gameStartTime, setGameStartTime] = useState(null);

            const [gameId, setGameId] = useState(null);
            const [active, setActive] = useState(0);
            const [card, setCard] = useState(null);
            const [customDeck, setCustomDeck] = useState([]);
            const [activeDeck, setActiveDeck] = useState([]); // Array filtrado final
            const [selectedModeName, setSelectedModeName] = useState(''); // cards, roulette, 18, custom

            const [infoModal, setInfoModal] = useState({ open: false, title: '', desc: '' });
            const [voting, setVoting] = useState(false);
            const [itCount, setItCount] = useState(0);

            const handleAdd = () => {
                if (name.trim() && !players.some(p => p.name === name.trim())) {
                    if (speedEnabled && (!weight || !gender)) return; // Validar se velocímetro ativo
                    setPlayers([...players, { name: name.trim(), shots: 0, weight, gender }]);
                    setName(''); setWeight(''); setGender('');
                }
            };
            const handleStart = async () => {
                if (players.length < 2) return;
                if (ENABLE_SUPABASE) {
                    try {
                        const { data, error } = await supabase.from('game_sessions').insert([{ players_data: players, status: 'playing' }]).select().single();
                        if (!error && data) setGameId(data.id);
                    } catch (e) {
                        console.info("Supabase table not found or not accessible. Continuing locally.");
                    }
                }
                setView('menu');
            };

            const handleSelectMode = (modeArgs) => {
                if (modeArgs === 'custom-editor') {
                    setView('custom-editor');
                    return;
                }

                let bDeck = [];
                if (modeArgs === 'cards') bDeck = CARDS_NORMAL;
                else if (modeArgs === '18') bDeck = CARDS_18;
                else if (modeArgs === 'roulette') bDeck = ROULETTE_BASE;
                else if (modeArgs === 'custom') bDeck = customDeck;

                setSelectedModeName(modeArgs);
                setActiveDeck(bDeck);
                if (bDeck.length > 0) {
                    setView('deck-config');
                }
            };

            const confirmDeck = (deck) => {
                setActiveDeck(deck);
                setGameStartTime(Date.now());
                if (selectedModeName === 'roulette') {
                    setView('roulette');
                } else {
                    setView(selectedModeName);
                }
            };

            const handleDraw = () => {
                const c = activeDeck[Math.floor(Math.random() * activeDeck.length)];
                setCard(c); const newP = [...players];
                if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
                if (c.type === 'everyone') newP.forEach(p => p.shots++);
                else if (c.bonus > 0) newP[active].shots += c.bonus;
                setPlayers(newP); setActive((active + 1) % players.length); setItCount(itCount + 1);
                if (ENABLE_SUPABASE && gameId) {
                    supabase.from('game_sessions').update({ players_data: newP }).eq('id', gameId).catch(e => console.info("Local mode"));
                }
                if (itCount > 20) setView('finish');
            };
            const updateShot = (pName, b) => {
                const newP = [...players];
                const idx = newP.findIndex(x => x.name === pName);
                if (idx !== -1) {
                    newP[idx].shots += b;
                    setPlayers(newP);
                    if (ENABLE_SUPABASE && gameId) {
                        supabase.from('game_sessions').update({ players_data: newP }).eq('id', gameId).catch(e => console.info("Local mode"));
                    }
                }
            };

            return (
                <main>
                    <AnimatePresence mode="wait">
                        {view === 'landing' && <LandingView key="l" onStart={() => setView('setup')} />}
                        {view === 'setup' && <SetupView key="s" players={players} name={name} setName={setName} weight={weight} setWeight={setWeight} gender={gender} setGender={setGender} speedEnabled={speedEnabled} setSpeedEnabled={setSpeedEnabled} onAdd={handleAdd} onRemove={n => setPlayers(players.filter(p => p.name !== n))} onStart={handleStart} />}
                        {view === 'menu' && <MenuView key="m" onSelectMode={m => handleSelectMode(m)} onCustom={() => handleSelectMode('custom-editor')} onInfo={(t, d) => setInfoModal({ open: true, title: t, desc: d })} />}
                        {view === 'custom-editor' && <CustomCreator key="ce" deck={customDeck} onSave={d => { setCustomDeck(d); setView('menu'); }} onBack={() => setView('menu')} />}
                        {view === 'deck-config' && <DeckConfigView key="dc" baseDeck={activeDeck} mode={selectedModeName} onAddCard={(card) => setActiveDeck([...activeDeck, card])} onBack={() => setView('menu')} onConfirm={confirmDeck} />}
                        {(view === 'cards' || view === '18' || view === 'custom') && <CardsView key="c" modeLabel={view === '18' ? 'MODO 18+' : (view === 'custom' ? 'MODO CUSTOM' : 'MODO CARTAS')} players={players} active={active} card={card} onDraw={handleDraw} onExit={() => setView('menu')} cardsCount={itCount} speedEnabled={speedEnabled} startTime={gameStartTime} />}
                        {view === 'roulette' && <RouletteView key="r" players={players} deck={activeDeck} onExit={() => setView('menu')} onFinish={(n, c) => updateShot(n, c.bonus)} onVote={() => setVoting(true)} speedEnabled={speedEnabled} startTime={gameStartTime} />}
                        {view === 'finish' && <StoryCard key="f" players={players} onRestart={() => { setPlayers(players.map(p => ({ ...p, shots: 0 }))); setItCount(0); setView('menu'); }} />}
                    </AnimatePresence>
                    {voting && <DemocracyVote players={players} onEnd={n => { updateShot(n, 1); setVoting(false); }} />}
                    {infoModal.open && <InfoModal title={infoModal.title} desc={infoModal.desc} onClose={() => setInfoModal({ open: false, title: '', desc: '' })} />}
                    <div className="fixed bottom-4 right-4 z-50">
                        {itCount > 5 && view !== 'finish' && view !== 'landing' && view !== 'setup' && <button onClick={() => setView('finish')} className="glass py-2 px-4 text-[9px] font-black uppercase text-primary/60 border-primary/20">Finalizar Partida</button>}
                    </div>
                </main>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
