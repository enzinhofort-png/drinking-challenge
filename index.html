<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink & Play | Premium Drinking Game</title>
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff006e;
            --secondary: #8338ec;
            --accent: #ffbe0b;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #e5e7eb;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .btn-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
            filter: brightness(1.1);
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Confetti Animation */
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }

        /* Card Flip Style */
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-[#ff006e10] rounded-full blur-[100px] animate-pulse-slow pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-[#8338ec10] rounded-full blur-[100px] animate-pulse-slow pointer-events-none"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Supabase Config ---
        const SUPABASE_URL = 'https://rzgoaeyqkpgdwhuozdkf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Z29hZXlxa3BnZHdodW96ZGtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyOTI2NTcsImV4cCI6MjA4MDg2ODY1N30.VtpQYkKJwIxZmtFTnfU9QxJMrnsNLEy5LjOUaZtQktA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Constants ---
        const DEFAULT_CARDS = [
            { text: "🥃 Beba 1 shot", type: "drink" },
            { text: "🥃🥃 Beba 2 shots", type: "drink" },
            { text: "🍻 Todos bebem!", type: "everyone" },
            { text: "😎 Todos bebem menos você", type: "safe" },
            { text: "👉 Escolha alguém para beber", type: "choose" },
            { text: "🎤 Conte uma piada ou beba 2 shots", type: "challenge" },
            { text: "🤔 Verdade ou shot", type: "challenge" },
            { text: "📜 Crie uma regra nova!", type: "rule" },
            { text: "😂 Quem rir, bebe!", type: "trap" },
            { text: "🖤 Quem usa preto, bebe!", type: "trap" },
            { text: "📱 Quem mexer no celular, bebe!", type: "trap" },
            { text: "🔁 Inverta a ordem do jogo!", type: "rule" },
            { text: "🫣 Revele um segredo ou beba 3 shots", type: "challenge" },
            { text: "🧊 Fique sem beber por 2 rodadas", type: "safe" }
        ];

        const CARD_COLORS = {
            drink: "from-pink-500 to-rose-600",
            everyone: "from-purple-500 to-indigo-600",
            safe: "from-emerald-400 to-teal-500",
            choose: "from-orange-400 to-amber-500",
            challenge: "from-yellow-400 to-orange-500",
            rule: "from-blue-500 to-cyan-600",
            trap: "from-red-500 to-rose-700"
        };

        // --- Components ---

        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Play: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>,
            Refresh: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        };

        function App() {
            const [screen, setScreen] = useState('setup'); // setup, play, results
            const [players, setPlayers] = useState([]);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [gameId, setGameId] = useState(null);
            const [currentCard, setCurrentCard] = useState(null);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [spinning, setSpinning] = useState(false);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(false);

            // --- Database Sync ---
            const syncGame = async (updatedPlayers) => {
                if (!gameId) return;
                try {
                    await supabase
                        .from('game_sessions')
                        .update({ players_data: updatedPlayers })
                        .eq('id', gameId);
                } catch (e) { console.error('Error syncing:', e); }
            };

            const startGame = async () => {
                if (players.length < 2) return;
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('game_sessions')
                        .insert([{ 
                            players_data: players.map(p => ({ name: p.name, shots: 0 })),
                            status: 'active'
                        }])
                        .select()
                        .single();
                    
                    if (data) {
                        setGameId(data.id);
                        setScreen('play');
                    }
                } catch (e) {
                    console.error('Error starting game:', e);
                    setScreen('play'); // Fallback to local only
                }
                setLoading(false);
            };

            const addPlayer = () => {
                if (!newPlayerName.trim()) return;
                if (players.some(p => p.name === newPlayerName.trim())) return;
                setPlayers([...players, { name: newPlayerName.trim(), shots: 0 }]);
                setNewPlayerName('');
            };

            const removePlayer = (idx) => {
                setPlayers(players.filter((_, i) => i !== idx));
            };

            const drawCard = () => {
                if (spinning) return;
                setSpinning(true);
                
                // Audio tick effect mockup
                const audio = new AudioContext();
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.connect(g);
                g.connect(audio.destination);
                o.frequency.value = 800;
                g.gain.setValueAtTime(0.05, audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.1);
                o.start();
                o.stop(audio.currentTime + 0.1);

                setTimeout(() => {
                    const randomCard = DEFAULT_CARDS[Math.floor(Math.random() * DEFAULT_CARDS.length)];
                    const player = players[currentPlayerIdx];
                    
                    setCurrentCard({ ...randomCard, targetPlayer: player.name });
                    
                    // Update state
                    let updatedShots = 0;
                    if (randomCard.type === 'drink') updatedShots = 1;
                    if (randomCard.text.includes('2 shots')) updatedShots = 2;

                    const newPlayers = [...players];
                    if (randomCard.type === 'everyone') {
                        newPlayers.forEach(p => p.shots += 1);
                    } else if (updatedShots > 0) {
                        newPlayers[currentPlayerIdx].shots += updatedShots;
                    }

                    setPlayers(newPlayers);
                    setHistory([{ player: player.name, challenge: randomCard.text }, ...history].slice(0, 10));
                    setCurrentPlayerIdx((currentPlayerIdx + 1) % players.length);
                    setSpinning(false);
                    
                    syncGame(newPlayers);
                }, 600);
            };

            // --- Views ---

            const SetupView = () => (
                <div className="max-w-md mx-auto pt-10 px-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div className="text-center mb-10">
                        <div className="text-6xl mb-4 animate-float">🍻</div>
                        <h1 className="text-4xl font-bold tracking-tight text-white mb-2">Drink & Play</h1>
                        <p className="text-gray-400">Adicione os jogadores para começar</p>
                    </div>

                    <div className="glass p-6 mb-8">
                        <div className="flex gap-3 mb-6">
                            <input 
                                type="text" 
                                value={newPlayerName}
                                onChange={e => setNewPlayerName(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && addPlayer()}
                                placeholder="Nome do jogador"
                                className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-pink-500/50 transition-all font-medium"
                            />
                            <button 
                                onClick={addPlayer}
                                className="w-12 h-12 flex items-center justify-center btn-gradient rounded-xl text-white shadow-lg"
                            >
                                <Icons.Plus />
                            </button>
                        </div>

                        <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                            {players.map((p, i) => (
                                <div key={i} className="flex items-center justify-between bg-white/5 border border-white/5 px-4 py-3 rounded-xl group animate-in slide-in-from-left-2 fade-in">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-500/20 to-purple-500/20 flex items-center justify-center text-xs font-bold text-pink-400 border border-pink-500/10">
                                            {i + 1}
                                        </div>
                                        <span className="font-semibold">{p.name}</span>
                                    </div>
                                    <button onClick={() => removePlayer(i)} className="text-gray-500 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100">
                                        <Icons.Trash />
                                    </button>
                                </div>
                            ))}
                            {players.length === 0 && (
                                <div className="text-center py-8 text-gray-500 italic">Nenhum jogador adicionado</div>
                            )}
                        </div>
                    </div>

                    <button 
                        onClick={startGame}
                        disabled={players.length < 2 || loading}
                        className={`w-full py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 shadow-xl btn-gradient disabled:opacity-30 disabled:pointer-events-none`}
                    >
                        {loading ? 'Preparando...' : <><Icons.Play /> Começar Jogo</>}
                    </button>
                </div>
            );

            const PlayView = () => (
                <div className="max-w-md mx-auto pt-6 px-6 animate-in fade-in duration-500">
                    {/* Header Info */}
                    <div className="flex items-center justify-between mb-8 glass px-4 py-3">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-xs font-bold tracking-widest uppercase text-gray-400">Partida Ativa</span>
                        </div>
                        <button onClick={() => setScreen('setup')} className="text-xs font-bold text-pink-500 uppercase tracking-widest hover:brightness-125">Encerrar</button>
                    </div>

                    {/* Turn Display */}
                    <div className="text-center mb-8">
                        <span className="text-xs font-bold uppercase tracking-widest text-pink-500 mb-1 block">Vez de</span>
                        <h2 className="text-3xl font-bold text-white">{players[currentPlayerIdx]?.name}</h2>
                    </div>

                    {/* Card Container */}
                    <div className="relative mb-10 h-[320px] w-full perspective-1000">
                        <div onClick={drawCard} className={`relative w-full h-full cursor-pointer transition-all duration-700 preserve-3d ${spinning ? 'scale-95 blur-[2px]' : ''}`}>
                            {!currentCard ? (
                                <div className="glass w-full h-full flex flex-col items-center justify-center border-2 border-dashed border-white/20 hover:border-pink-500/30 transition-all group">
                                    <div className="text-6xl mb-4 group-hover:scale-110 transition-transform">🃏</div>
                                    <span className="text-gray-400 font-medium">Toque para puxar</span>
                                </div>
                            ) : (
                                <div className={`w-full h-full rounded-[32px] p-8 flex flex-col items-center justify-center text-center shadow-2xl bg-gradient-to-br ${CARD_COLORS[currentCard.type] || 'from-gray-700 to-gray-900'} border border-white/20 relative overflow-hidden animate-in zoom-in-95 duration-300`}>
                                    {/* Deco */}
                                    <div className="absolute top-[-20%] right-[-20%] w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                                    <div className="absolute bottom-[-20%] left-[-20%] w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
                                    
                                    <span className="text-white/60 text-xs font-bold uppercase tracking-[0.2em] mb-4 z-10">{currentCard.targetPlayer}</span>
                                    <h3 className="text-2xl font-bold text-white leading-tight z-10 drop-shadow-lg">{currentCard.text}</h3>
                                    
                                    <div className="absolute bottom-6 right-8 text-4xl opacity-20 transform rotate-12">
                                        {currentCard.type === 'drink' ? '🥃' : '🎲'}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Quick Stats */}
                    <div className="glass p-5 mb-6 overflow-hidden">
                        <h4 className="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-4 flex items-center justify-between">
                            <span>Placar</span>
                            <span>Shots 🥃</span>
                        </h4>
                        <div className="space-y-3">
                            {players.map((p, i) => (
                                <div key={i} className={`flex items-center justify-between ${i === currentPlayerIdx ? 'text-pink-400' : ''}`}>
                                    <span className="text-sm font-semibold">{p.name}</span>
                                    <div className="flex items-center gap-1 group">
                                        <div className="h-1 w-12 bg-white/5 rounded-full overflow-hidden mr-2">
                                            <div className="h-full bg-pink-500 rounded-full" style={{ width: `${Math.min(p.shots * 10, 100)}%` }}></div>
                                        </div>
                                        <span className="font-mono font-bold text-sm min-w-[20px] text-right">{p.shots}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* History */}
                    {history.length > 0 && (
                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-1000">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-3">Últimas Rodadas</h4>
                            <div className="space-y-2 opacity-60">
                                {history.map((h, i) => (
                                    <div key={i} className="text-xs py-1 border-b border-white/5 flex justify-between">
                                        <span className="font-bold">{h.player}</span>
                                        <span className="text-gray-400 truncate ml-4 max-w-[180px]">{h.challenge}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {screen === 'setup' ? <SetupView /> : <PlayView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
