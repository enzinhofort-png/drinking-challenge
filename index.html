<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRINK & PLAY | Premium Experience</title>
    <link rel="icon"
        href="data:image/x-icon;base64,AAABAAEAAQEAAAEAIAAwAAAAFgAAACgAAAABAAAAAgAAAAEAIAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAnAAAA">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #ff006e;
            --secondary: #8338ec;
            --bg: #030712;
        }

        * {
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #f3f4f6;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-premium:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
            filter: brightness(1.2);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #ff006e10 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes mesh {

            0%,
            100% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.1) translate(20px, 10px);
            }
        }

        .mesh-gradient {
            background: radial-gradient(circle at 50% 50%, #ff006e15 0%, transparent 50%), radial-gradient(circle at 100% 100%, #3a86ff10 0%, transparent 40%);
            filter: blur(80px);
            animation: mesh 10s infinite ease-in-out;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .roulette-container {
            position: relative;
            height: 180px;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .roulette-marker {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 50px;
            transform: translateY(-50%);
            border: 2px solid var(--primary);
            background: rgba(255, 0, 110, 0.1);
            z-index: 10;
            pointer-events: none;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.2);
        }
    </style>
</head>

<body>
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="mesh-gradient absolute inset-0"></div>
    </div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const MotionProxy = new Proxy({}, { get: (t, p) => (props) => <div {...props} /> });
        const motion = window.Motion?.motion || MotionProxy;
        const AnimatePresence = window.Motion?.AnimatePresence || (({ children }) => <>{children}</>);

        // --- Config ---
        const SUPABASE_URL = 'https://rzgoaeyqkpgdwhuozdkf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Z29hZXlxa3BnZHdodW96ZGtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyOTI2NTcsImV4cCI6MjA4MDg2ODY1N30.VtpQYkKJwIxZmtFTnfU9QxJMrnsNLEy5LjOUaZtQktA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const CARDS = [
            { text: "🥃 Beba 1 shot", type: "drink", bonus: 1 },
            { text: "🥃🥃 Beba 2 shots", type: "drink", bonus: 2 },
            { text: "🍻 Todos bebem!", type: "everyone", bonus: 1 },
            { text: "😎 Todos bebem menos você", type: "safe", bonus: 0 },
            { text: "👉 Escolha alguém para beber", type: "choose", bonus: 0 },
            { text: "🎤 Conte uma piada ou beba 2 shots", type: "challenge", bonus: 2 },
            { text: "🤔 Verdade ou shot", type: "challenge", bonus: 1 },
            { text: "📜 Crie uma regra nova!", type: "rule", bonus: 0 },
            { text: "😂 Quem rir, bebe!", type: "trap", bonus: 1 },
            { text: "🖤 Quem usa preto, bebe!", type: "trap", bonus: 1 },
            { text: "📱 Quem mexer no celular, bebe!", type: "trap", bonus: 1 },
            { text: "🫣 Revele um segredo ou beba 3 shots", type: "challenge", bonus: 3 }
        ];

        const ROULETTE_CHALLENGES = [
            { text: "🥃 Beba 1 shot", icon: "🥃", bonus: 1 },
            { text: "🥃🥃 Beba 2 shots", icon: "🥃", bonus: 2 },
            { text: "🍻 Todos bebem!", icon: "🍻", bonus: 1 },
            { text: "😎 Safou! Não bebe", icon: "😌", bonus: 0 },
            { text: "👉 Escolha 1", icon: "👉", bonus: 0 },
            { text: "🎤 Cante algo", icon: "🎤", bonus: 0 },
            { text: "🤔 Verdade/Shot", icon: "🤔", bonus: 1 },
            { text: "🤣 Conte piada", icon: "🤣", bonus: 0 }
        ];

        const THEMES = { drink: "from-rose-500 to-pink-600", everyone: "from-indigo-500 to-purple-600", safe: "from-emerald-400 to-teal-500", choose: "from-amber-400 to-orange-500", challenge: "from-orange-400 to-red-500", rule: "from-cyan-400 to-blue-500", trap: "from-red-600 to-pink-700" };

        const Icons = {
            Sparkles: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3 1.912 5.886L19.8 10.8 13.912 12.714 12 18.6l-1.912-5.886L4.2 10.8l5.886-1.914L12 3Z"></path></svg>,
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        };

        // --- Components ---
        const RouletteWheel = ({ items, spin, onEnd }) => {
            const [offset, setOffset] = useState(0);
            const itemH = 60;
            const ref = useRef();

            useEffect(() => {
                if (spin) {
                    const extraSpins = 5 + Math.floor(Math.random() * 5);
                    const targetIdx = Math.floor(Math.random() * items.length);
                    const totalOffset = (extraSpins * items.length + targetIdx) * itemH;
                    setOffset(totalOffset);
                    setTimeout(() => onEnd(items[targetIdx]), 4000);
                }
            }, [spin]);

            const displayItems = useMemo(() => {
                let res = []; for (let i = 0; i < 30; i++) res = [...res, ...items]; return res;
            }, [items]);

            return (
                <div className="roulette-container w-full">
                    <div className="roulette-marker"></div>
                    <motion.div
                        initial={false}
                        animate={{ y: -offset + 60 }}
                        transition={{ duration: spin ? 4 : 0, ease: [0.15, 0.85, 0.35, 1] }}
                        className="flex flex-col"
                    >
                        {displayItems.map((it, i) => (
                            <div key={i} className="h-[60px] flex items-center justify-center font-bold text-lg tracking-wider text-white/80">
                                {typeof it === 'string' ? it : it.text}
                            </div>
                        ))}
                    </motion.div>
                </div>
            );
        };

        const LandingView = ({ onStart }) => (
            <div className="flex flex-col items-center justify-center min-h-screen text-center px-6">
                <div className="text-[100px] mb-4">🥃</div>
                <h1 className="text-6xl font-extrabold gradient-text italic leading-none text-glow uppercase">Drink <br /><span className="text-primary">&</span> Play</h1>
                <p className="text-gray-400 my-10 max-w-xs font-light">A experiência social definitiva. Pronto para o próximo nível?</p>
                <button onClick={onStart} className="btn-premium px-12 py-5 rounded-full text-xl font-bold uppercase tracking-widest text-white">Entrar na Roda</button>
            </div>
        );

        const MenuView = ({ onSelectMode }) => (
            <div className="max-w-md mx-auto pt-20 px-8 flex flex-col gap-6">
                <h2 className="text-3xl font-black italic uppercase mb-4">Escolha Modo</h2>
                <button onClick={() => onSelectMode('cards')} className="glass p-8 text-left hover:bg-white/5 transition-all group">
                    <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">🃏</div>
                    <h3 className="text-2xl font-bold text-primary italic uppercase mb-2">Cartas Premium</h3>
                    <p className="text-gray-500 text-sm">Desafios clássicos em formato de deck.</p>
                </button>
                <button onClick={() => onSelectMode('roulette')} className="glass p-8 text-left hover:bg-white/5 transition-all group">
                    <div className="text-4xl mb-4 group-hover:scale-110 transition-transform">🎡</div>
                    <h3 className="text-2xl font-bold text-secondary italic uppercase mb-2">Roleta Extreme</h3>
                    <p className="text-gray-500 text-sm">Sorteie quem bebe e o quê em tempo real.</p>
                </button>
            </div>
        );

        const SetupView = ({ players, onAdd, onRemove, onStart, name, setName }) => (
            <div className="max-w-md mx-auto pt-20 px-8 flex flex-col min-h-screen">
                <h2 className="text-4xl font-black italic uppercase mb-2">Esquadrão</h2>
                <p className="text-gray-400 mb-10">Quem está na roda hoje?</p>
                <div className="glass p-6 mb-10">
                    <div className="flex gap-2 mb-6">
                        <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && onAdd()} placeholder="NOME..." className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary" />
                        <button onClick={onAdd} className="w-12 h-12 bg-primary rounded-xl flex items-center justify-center"><Icons.Plus /></button>
                    </div>
                    <div className="space-y-3 max-h-[300px] overflow-y-auto custom-scroll pr-2">
                        {players.map(p => (
                            <div key={p.name} className="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                                <span className="font-bold">{p.name}</span>
                                <button onClick={() => onRemove(p.name)} className="text-gray-500 hover:text-red-500"><Icons.Trash /></button>
                            </div>
                        ))}
                    </div>
                </div>
                <button onClick={onStart} disabled={players.length < 2} className="btn-premium w-full py-5 rounded-3xl text-xl font-black uppercase tracking-widest disabled:opacity-20">Confirmar Time</button>
            </div>
        );

        const CardsView = ({ players, active, onDraw, card, drawing, onExit }) => (
            <div className="max-w-md mx-auto pt-10 px-8 flex flex-col min-h-screen">
                <div className="flex justify-between items-center mb-10">
                    <span className="text-xs font-bold text-primary uppercase tracking-widest italic">Modo Cartas</span>
                    <button onClick={onExit} className="text-xs opacity-40">Sair</button>
                </div>
                <div className="text-center mb-8">
                    <p className="text-xs uppercase tracking-widest text-gray-500 mb-1">Vez de</p>
                    <h2 className="text-3xl font-black italic uppercase text-glow">{players[active]?.name}</h2>
                </div>
                <div className="relative h-[350px] mb-10 cursor-pointer" onClick={onDraw}>
                    <div className={`w-full h-full glass rounded-[40px] border-2 border-dashed border-white/10 flex flex-col items-center justify-center transition-all ${card ? 'opacity-0 scale-90' : 'opacity-100'}`}>
                        <div className="text-7xl mb-4">🃏</div><p className="font-bold text-gray-500 italic uppercase">Puxar Carta</p>
                    </div>
                    <AnimatePresence>
                        {card && (
                            <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} className={`absolute inset-0 rounded-[40px] p-10 flex flex-col items-center justify-center text-center bg-gradient-to-br shadow-2xl ${THEMES[card.type]}`}>
                                <h3 className="text-2xl font-black text-white leading-tight uppercase italic">{card.text}</h3>
                                <div className="mt-8 flex gap-2">{Array(card.bonus || 1).fill('🥃').map((s, i) => <span key={i} className="text-2xl">{s}</span>)}</div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
                <button onClick={onDraw} className="btn-premium w-full py-5 rounded-3xl text-xl font-black uppercase">{card ? 'Próxima' : 'Jogar'}</button>
            </div>
        );

        const RouletteView = ({ players, onExit, onFinish }) => {
            const [spinning, setSpinning] = useState(false);
            const [pResult, setPResult] = useState(null);
            const [cResult, setCResult] = useState(null);
            const [done, setDone] = useState(false);

            const handleSpin = () => { if (spinning) return; setSpinning(true); setDone(false); setPResult(null); setCResult(null); };
            const checkDone = () => { if (pResult && cResult) { setSpinning(false); setDone(true); onFinish(pResult, cResult); } };

            return (
                <div className="max-w-md mx-auto pt-10 px-8 flex flex-col min-h-screen">
                    <div className="flex justify-between items-center mb-10">
                        <span className="text-xs font-bold text-secondary uppercase tracking-widest italic">Roleta Extreme</span>
                        <button onClick={onExit} className="text-xs opacity-40">Sair</button>
                    </div>
                    <div className="flex flex-col gap-4 mb-10">
                        <RouletteWheel items={players.map(p => p.name)} spin={spinning} onEnd={r => { setPResult(r); }} />
                        <div className="text-center font-black text-2xl italic text-primary">VAI BEBER...</div>
                        <RouletteWheel items={ROULETTE_CHALLENGES} spin={spinning} onEnd={r => { setCResult(r); }} />
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center">
                        <AnimatePresence>
                            {(pResult && cResult) && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="text-center glass p-6 w-full mb-6">
                                    <h4 className="text-xl font-black text-white italic uppercase">{pResult}</h4>
                                    <p className="text-primary font-bold text-2xl">{cResult.text}</p>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                    <button onClick={handleSpin} disabled={spinning} className="btn-premium w-full py-5 rounded-3xl text-xl font-black uppercase mb-10 disabled:opacity-50">GIRAR SORTE</button>
                    {pResult && cResult && checkDone()}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('landing');
            const [players, setPlayers] = useState([]);
            const [playerName, setPlayerName] = useState('');
            const [gameId, setGameId] = useState(null);
            const [active, setActive] = useState(0);
            const [card, setCard] = useState(null);
            const [history, setHistory] = useState([]);

            const handleAdd = () => {
                const n = playerName.trim(); if (!n || players.some(p => p.name === n)) return;
                setPlayers([...players, { name: n, shots: 0 }]); setPlayerName('');
            };

            const handleStart = async () => {
                const { data } = await supabase.from('game_sessions').insert([{ players_data: players, status: 'playing' }]).select().single();
                if (data) setGameId(data.id); setView('menu');
            };

            const handleCardDraw = () => {
                const c = CARDS[Math.floor(Math.random() * CARDS.length)];
                setCard({ ...c, for: players[active].name });
                const newP = [...players];
                if (c.type === 'everyone') newP.forEach(p => p.shots++);
                else if (c.bonus > 0) newP[active].shots += c.bonus;
                setPlayers(newP); setActive((active + 1) % players.length);
                if (gameId) supabase.from('game_sessions').update({ players_data: newP }).eq('id', gameId).then();
            };

            const handleRouletteFinish = (name, chal) => {
                const newP = [...players]; const pIdx = newP.findIndex(x => x.name === name);
                if (chal.bonus > 0) newP[pIdx].shots += chal.bonus;
                setPlayers(newP);
                if (gameId) supabase.from('game_sessions').update({ players_data: newP }).eq('id', gameId).then();
            };

            return (
                <main>
                    <AnimatePresence mode="wait">
                        {view === 'landing' && <LandingView onStart={() => setView('setup')} />}
                        {view === 'setup' && <SetupView players={players} name={playerName} setName={setPlayerName} onAdd={handleAdd} onRemove={n => setPlayers(players.filter(p => p.name !== n))} onStart={handleStart} />}
                        {view === 'menu' && <MenuView onSelectMode={m => setView(m)} />}
                        {view === 'cards' && <CardsView players={players} active={active} card={card} onDraw={handleCardDraw} onExit={() => setView('menu')} />}
                        {view === 'roulette' && <RouletteView players={players} onExit={() => setView('menu')} onFinish={handleRouletteFinish} />}
                    </AnimatePresence>
                </main>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
